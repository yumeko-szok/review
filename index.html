<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <style>
    body {

    .container {
      max-width: 720px;

      font-size: 24px;
      font-weight: normal;
      letter-spacing: 0.15em;
      margin-bottom: 40px;
    }

    p {
      font-size: 14px;
      line-height: 2;
      color: #444;
    }

    a {
      display: inline-block;
      margin-top: 50px;
      padding: 12px 30px;

      color: #1a1a1a;

      letter-spacing: 0.1em;
    }

    a:hover {
      opacity: 0.7;

    .container::before,
